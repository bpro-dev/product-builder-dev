<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>행운의 로또 번호 추첨기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <button id="theme-toggle" class="theme-toggle-btn" aria-label="테마 변경">
      <span class="theme-icon">🌙</span>
    </button>
    
    <header>
      <h1>행운의 로또 번호 추첨기</h1>
      <p>오늘의 행운을 확인해보세요!</p>
    </header>

    <main>
      <section class="draw-area">
        <div id="balls-container" class="balls-container">
          <div class="placeholder">행운을 불러오는 중...</div>
        </div>
        <button id="draw-btn" class="draw-btn">번호 추첨하기</button>
      </section>

      <section class="history-area">
        <h2>최근 추첨 이력</h2>
        <ul id="history-list" class="history-list">
          <li class="empty-msg">아직 추첨 이력이 없습니다.</li>
        </ul>
      </section>
      <section class="contact-area">
        <h2>제휴 및 문의하기</h2>
        <form action="https://formspree.io/f/mgonyqav" method="POST" class="contact-form">
          <div class="form-group">
            <label for="name">성함/기관명</label>
            <input type="text" id="name" name="name" required placeholder="예: 홍길동">
          </div>
          <div class="form-group">
            <label for="email">이메일 주소</label>
            <input type="email" id="email" name="email" required placeholder="example@mail.com">
          </div>
          <div class="form-group">
            <label for="message">문의 내용</label>
            <textarea id="message" name="message" required placeholder="제휴 제안 또는 문의 내용을 입력해주세요."></textarea>
          </div>
          <button type="submit" class="submit-btn">문의 보내기</button>
        </form>
      </section>

      <section class="comments-area">
        <div id="disqus_thread"></div>
        <script>
            /**
            *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
            *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
            /*
            var disqus_config = function () {
            this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
            this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
            };
            */
            (function() { // DON'T EDIT BELOW THIS LINE
            var d = document, s = d.createElement('script');
            s.src = 'https://productbuilderdev.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
      </section>

    </main>

    <footer>
      <p>&copy; 2026 행운의 로또. All rights reserved.</p>
    </footer>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
